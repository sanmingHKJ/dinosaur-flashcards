<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+Cjx0ZXh0IHk9IjI4IiBmb250LXNpemU9IjI4Ij7wn6aVPC90ZXh0Pgo8L3N2Zz4=">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦕 恐龙闪卡 🦖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #FFF5E6 0%, #FFE8D6 50%, #FFDAB9 100%);
  user-select: none;
}

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.95);
  padding: 12px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  text-align: center;
}
.app-title {
  font-size: 1.4em; font-weight: 800;
  background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.progress-bar {
  width: 100%; height: 6px; background: #eee; border-radius: 3px; 
  overflow: hidden; margin-top: 8px;
}
.progress-fill {
  height: 100%; border-radius: 3px; transition: width 0.3s;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4);
}

.card-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 90px 16px 80px;
}

.card-wrapper {
  width: 100%; max-width: 400px; aspect-ratio: 3/4;
  max-height: calc(100vh - 170px);
  perspective: 1200px;
  cursor: pointer;
}
.card {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; border-radius: 24px;
  backface-visibility: hidden;
  padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.card-front {
  background: linear-gradient(160deg, #E3F2FD 0%, #90CAF9 50%, #64B5F6 100%);
}
.card-back {
  transform: rotateY(180deg);
  background: linear-gradient(160deg, #E8F5E9 0%, #A5D6A7 100%);
}

.dino-img {
  text-align: center; margin: 10px 0;
  height: 180px; display: flex; align-items: center; justify-content: center;
}
.dino-img img {
  max-height: 170px; max-width: 90%;
  object-fit: contain;
  filter: drop-shadow(3px 5px 10px rgba(0,0,0,0.2));
}

.dino-name-cn { font-size: 2em; font-weight: 900; text-align: center; color: #333; }
.dino-name-en { font-size: 1.1em; font-weight: 600; text-align: center; color: #555; margin: 4px 0; }
.dino-meta {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
  margin: 12px 0;
}
.meta-tag {
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.85em; font-weight: 600;
  background: rgba(255,255,255,0.7);
  color: #444;
}
.flip-hint {
  text-align: center; font-size: 0.8em; color: rgba(0,0,0,0.4);
  margin-top: auto;
}

.back-title { font-size: 1.2em; font-weight: 800; text-align: center; margin-bottom: 12px; }
.fun-fact {
  font-size: 1em; line-height: 1.7; color: #333;
  background: rgba(255,255,255,0.6); border-radius: 16px;
  padding: 16px;
}
.fun-fact-label { font-weight: 800; color: #E74C3C; }

.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.95);
  padding: 12px 20px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
}
.nav-btn {
  width: 56px; height: 56px; border-radius: 50%;
  border: none; font-size: 1.5em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white; box-shadow: 0 4px 12px rgba(255,107,107,0.3);
  transition: all 0.2s;
}
.nav-btn:active { transform: scale(0.9); }
.nav-btn:disabled { opacity: 0.3; }
.card-counter { font-size: 1.2em; font-weight: 800; color: #555; }
</style>
</head>
<body>

<div class="header">
  <div class="app-title">🦕 恐龙闪卡 🦖</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="card-container" id="cardContainer"></div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="prevCard()">⬅️</button>
  <span class="card-counter" id="cardCounter">1 / 10</span>
  <button class="nav-btn" id="nextBtn" onclick="nextCard()">➡️</button>
</div>

<script>
const DINOS = [
  {
    id: 1,
    name: "马门溪龙",
    en: "Mamenchisaurus",
    img: "切图_抠图/01_Mamenchisaurus_马门溪龙.png",
    era: "侏罗纪",
    diet: "食草",
    size: "全长约22米，脖子就占了一半！",
    fact: "马门溪龙有全世界最长的脖子！它的脖子有19节骨头（你的脖子只有7节），占了身体长度的一半！这是在中国四川发现的恐龙哦！"
  },
  {
    id: 2,
    name: "无齿翼龙",
    en: "Pteranodon",
    img: "切图_抠图/02_Pteranodon_无齿翼龙.png",
    era: "白垩纪",
    diet: "食鱼",
    size: "翼展可达7米，像一架小飞机！",
    fact: "无齿翼龙其实不是恐龙，而是翼龙！它没有牙齿，用长长的喙抓鱼吃。头上有一个大大的冠，可能是用来在飞行时保持平衡的！"
  },
  {
    id: 3,
    name: "剑龙",
    en: "Stegosaurus",
    img: "切图_抠图/03_Stegosaurus_剑龙.png",
    era: "侏罗纪",
    diet: "食草",
    size: "像一辆公交车那么长！背上有好多三角形的板子！",
    fact: "剑龙的脑子只有核桃那么大！它那么大的身体配一个核桃大小的脑袋，是恐龙里脑子最小的之一！但它尾巴上的4根大刺可厉害了！"
  },
  {
    id: 4,
    name: "腔骨龙",
    en: "Coelophysis",
    img: "切图_抠图/04_Coelophysis_腔骨龙.png",
    era: "三叠纪",
    diet: "食肉",
    size: "和一只大狗差不多大！",
    fact: "腔骨龙是最早的恐龙之一！它的骨头是空心的，像吸管一样，所以跑起来特别特别快，比你骑小自行车还快呢！"
  },
  {
    id: 5,
    name: "双型齿翼龙",
    en: "Dimorphodon",
    img: "切图_抠图/05_Dimorphodon_双型齿翼龙.png",
    era: "侏罗纪",
    diet: "食肉",
    size: "翼展约1.4米，像一只大老鹰！",
    fact: "双型齿翼龙有两种不同形状的牙齿，所以叫'双型齿'！前面是尖牙用来抓猎物，后面是小牙用来咀嚼。它的头很大，看起来有点萌！"
  },
  {
    id: 6,
    name: "异特龙",
    en: "Allosaurus",
    img: "切图_抠图/06_Allosaurus_异特龙.png",
    era: "侏罗纪",
    diet: "食肉",
    size: "像一辆大卡车那么长！有两个爸爸那么高！",
    fact: "异特龙是侏罗纪的\"霸王龙\"！它的嘴巴可以张得超级大，像蛇一样把下巴\"脱臼\"来咬更大的东西！它还会组队打猎，一群异特龙一起去抓大恐龙！"
  },
  {
    id: 7,
    name: "窃蛋龙",
    en: "Oviraptor",
    img: "切图_抠图/07_Oviraptor_窃蛋龙.png",
    era: "白垩纪",
    diet: "杂食",
    size: "像一只大火鸡那么大！",
    fact: "窃蛋龙其实不偷蛋！科学家一开始以为它在偷别人的蛋，但后来发现它是在保护自己的蛋！它是个好妈妈/好爸爸！它有一个像鹦鹉一样的喙，可能吃坚果和小动物。"
  },
  {
    id: 8,
    name: "美颌龙",
    en: "Compsognathus",
    img: "切图_抠图/08_Compsognathus_美颌龙.png",
    era: "侏罗纪",
    diet: "食肉",
    size: "只有一只鸡那么大！",
    fact: "美颌龙是最小的恐龙之一，只有鸡那么大！但别小看它，它跑得飞快，专门抓蜥蜴和虫子吃。它的名字意思是\"漂亮的下巴\"！"
  },
  {
    id: 9,
    name: "尖角龙",
    en: "Centrosaurus",
    img: "切图_抠图/09_Centrosaurus_尖角龙.png",
    era: "白垩纪",
    diet: "食草",
    size: "像一辆小汽车那么大！",
    fact: "尖角龙鼻子上有一个大角，头盾边缘还有很多小角和装饰！科学家发现过成千上万只尖角龙的化石在一起，说明它们是成群生活的，就像牛群一样！"
  },
  {
    id: 10,
    name: "风神翼龙",
    en: "Quetzalcoatlus",
    img: "切图_抠图/10_Quetzalcoatlus_风神翼龙.png",
    era: "白垩纪",
    diet: "食肉",
    size: "翼展可达11米！站起来有长颈鹿那么高！",
    fact: "风神翼龙是有史以来最大的飞行动物！它的翼展有11米，比一架小飞机还宽！它站在地上有长颈鹿那么高，可能会像鹤一样在地上走来走去抓小恐龙吃！"
  }
];

let currentIndex = 0;

function renderCard() {
  const dino = DINOS[currentIndex];
  const container = document.getElementById('cardContainer');
  
  container.innerHTML = `
    <div class="card-wrapper" onclick="flipCard()">
      <div class="card" id="card">
        <div class="card-face card-front">
          <div class="dino-img">
            <img src="${dino.img}" alt="${dino.name}">
          </div>
          <div class="dino-name-cn">${dino.name}</div>
          <div class="dino-name-en">${dino.en}</div>
          <div class="dino-meta">
            <span class="meta-tag">🕐 ${dino.era}</span>
            <span class="meta-tag">${dino.diet === '食草' ? '🌿' : dino.diet === '食肉' ? '🍖' : dino.diet === '食鱼' ? '🐟' : '🍽️'} ${dino.diet}</span>
          </div>
          <div class="dino-meta">
            <span class="meta-tag">📏 ${dino.size}</span>
          </div>
          <div class="flip-hint">👆 点击翻转查看趣味知识</div>
        </div>
        <div class="card-face card-back">
          <div class="back-title">🧠 趣味知识</div>
          <div class="fun-fact">
            <span class="fun-fact-label">你知道吗？</span><br><br>
            ${dino.fact}
          </div>
          <div class="flip-hint" style="margin-top:20px;">👆 点击翻回正面</div>
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('cardCounter').textContent = `${currentIndex + 1} / ${DINOS.length}`;
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / DINOS.length) * 100}%`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === DINOS.length - 1;
}

function flipCard() {
  document.getElementById('card').classList.toggle('flipped');
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function nextCard() {
  if (currentIndex < DINOS.length - 1) {
    currentIndex++;
    renderCard();
  }
}

// 支持滑动
let touchStartX = 0;
document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) prevCard();
    else nextCard();
  }
});

// 键盘支持
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === ' ') flipCard();
});

renderCard();
</script>
</body>
</html>
