<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+Cjx0ZXh0IHk9IjI4IiBmb250LXNpemU9IjI4Ij7wn6aVPC90ZXh0Pgo8L3N2Zz4=">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦕 恐龙闪卡 🦖</title>
<style>
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #E8F5E9 0%, #FFF8E1 100%);
  user-select: none;
}

/* 顶部进度 */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: white;
  padding: 10px 16px;
  display: flex; justify-content: center; align-items: center;
  gap: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: #E0E0E0;
}
.dot.active { background: #FF7043; transform: scale(1.2); }
.dot.seen { background: #81C784; }

/* 调试信息 */
.debug {
  position: fixed; top: 50px; left: 10px; z-index: 999;
  background: rgba(0,0,0,0.8); color: #0f0;
  padding: 8px; font-size: 12px; border-radius: 4px;
  font-family: monospace;
  pointer-events: none;
  display: none;
}

/* 自动播放按钮 */
.auto-btn {
  position: fixed; top: 8px; right: 12px; z-index: 101;
  width: 40px; height: 40px; border-radius: 50%;
  border: none; font-size: 1.2em;
  background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
}
.auto-btn.playing { background: #81C784; }
/* 扩大自动播放按钮点击区域 */
.auto-btn::before {
  content: '';
  position: absolute;
  top: -10px; bottom: -10px;
  left: -10px; right: -10px;
}

/* 卡片区域 */
.card-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 55px 16px 110px;
}

.card {
  width: 100%; max-width: 360px;
  background: white;
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  text-align: center;
  cursor: pointer;
  touch-action: manipulation;
}

/* 恐龙图片 */
.dino-img {
  height: 200px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
}
.dino-img img {
  max-height: 190px; max-width: 100%;
  object-fit: contain;
  filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.15));
  animation: gentleBounce 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes gentleBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* 恐龙名字 */
.dino-name {
  font-size: 2em;
  font-weight: 800;
  color: #333;
  margin-bottom: 16px;
}

/* 属性标签 */
.dino-tags {
  display: flex;
  justify-content: center;
  gap: 24px;
  font-size: 2.2em;
  margin-bottom: 20px;
}

/* 播放状态 */
.play-status {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2em;
  color: #999;
}

/* 声波动画 */
.sound-wave {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 40px;
}
.sound-wave span {
  width: 5px;
  background: #FF7043;
  border-radius: 3px;
  animation: wave 1s ease-in-out infinite;
}
.sound-wave span:nth-child(1) { height: 12px; animation-delay: 0s; }
.sound-wave span:nth-child(2) { height: 20px; animation-delay: 0.15s; }
.sound-wave span:nth-child(3) { height: 28px; animation-delay: 0.3s; }
.sound-wave span:nth-child(4) { height: 20px; animation-delay: 0.45s; }
.sound-wave span:nth-child(5) { height: 12px; animation-delay: 0.6s; }
@keyframes wave {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(1.5); }
}

/* 导航按钮 */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white;
  padding: 16px 32px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
}
.nav-btn {
  width: 72px; height: 72px; border-radius: 50%;
  border: none; font-size: 2em;
  display: flex; align-items: center; justify-content: center;
  background: #FF7043;
  color: white;
  box-shadow: 0 4px 12px rgba(255,112,67,0.3);
  cursor: pointer;
  transition: transform 0.1s;
  touch-action: manipulation;
  position: relative;
}
/* 扩大按钮点击区域 */
.nav-btn::before {
  content: '';
  position: absolute;
  top: -15px; bottom: -15px;
  left: -15px; right: -15px;
}
.nav-btn:disabled { 
  background: #E0E0E0; 
  box-shadow: none; 
  opacity: 0.5; 
}
.nav-btn.next { 
  background: #42A5F5; 
  box-shadow: 0 4px 12px rgba(66,165,245,0.3); 
}
.nav-btn.pressed {
  transform: scale(0.9);
}

.nav-center {
  font-size: 1.4em;
  font-weight: 700;
  color: #666;
}
</style>
</head>
<body>

<div class="debug" id="debug">等待交互...</div>
<div class="header" id="progressDots"></div>
<button class="auto-btn" id="autoBtn">▶️</button>

<div class="card-container">
  <div class="card" id="card"></div>
</div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn">◀</button>
  <span class="nav-center" id="navCenter">1 / 10</span>
  <button class="nav-btn next" id="nextBtn">▶</button>
</div>

<script>
const DINOS = [
  { name: "马门溪龙", img: "images/01_mamenchisaurus.png", dietEmoji: "🌿",
    sound: "马门溪龙！脖子超级超级长,比长颈鹿还要长好几倍呢！" },
  { name: "无齿翼龙", img: "images/02_pteranodon.png", dietEmoji: "🐟",
    sound: "无齿翼龙！会飞的大翅膀,在天上抓鱼吃！" },
  { name: "剑龙", img: "images/03_stegosaurus.png", dietEmoji: "🌿",
    sound: "剑龙！背上有好多三角形的板子,尾巴上还有大刺！" },
  { name: "腔骨龙", img: "images/04_coelophysis.png", dietEmoji: "🍖",
    sound: "腔骨龙！跑得飞快的小恐龙,骨头是空心的,像吸管一样轻！" },
  { name: "双型齿翼龙", img: "images/05_dimorphodon.png", dietEmoji: "🍖",
    sound: "双型齿翼龙！有两种牙齿的飞龙,头很大,萌萌的！" },
  { name: "异特龙", img: "images/06_allosaurus.png", dietEmoji: "🍖",
    sound: "异特龙！超级厉害的大恐龙,嘴巴可以张得很大很大！" },
  { name: "窃蛋龙", img: "images/07_oviraptor.png", dietEmoji: "🥚",
    sound: "窃蛋龙！其实是个好妈妈,在保护自己的蛋宝宝呢！" },
  { name: "美颌龙", img: "images/08_compsognathus.png", dietEmoji: "🍖",
    sound: "美颌龙！只有小鸡那么大,是最小的恐龙,跑得可快了！" },
  { name: "尖角龙", img: "images/09_centrosaurus.png", dietEmoji: "🌿",
    sound: "尖角龙！鼻子上有一个大角,喜欢一大群一起走！" },
  { name: "风神翼龙", img: "images/10_quetzalcoatlus.png", dietEmoji: "🍖",
    sound: "风神翼龙！最大的飞行动物,站起来有长颈鹿那么高！" }
];

let currentIndex = 0;
let seen = new Set();
let autoPlay = false;
let autoTimer = null;
let debugMode = false; // 设为 true 显示调试信息

const synth = window.speechSynthesis;
const debugEl = document.getElementById('debug');

function log(msg) {
  if (debugMode) {
    console.log(msg);
    debugEl.textContent = msg;
    debugEl.style.display = 'block';
  }
}

function speak(text, onEnd) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.8;
  u.pitch = 1.15;
  u.onstart = () => {
    const statusEl = document.querySelector('.play-status');
    if (statusEl) {
      statusEl.innerHTML = '<div class="sound-wave"><span></span><span></span><span></span><span></span><span></span></div>';
    }
  };
  u.onend = () => {
    const statusEl = document.querySelector('.play-status');
    if (statusEl) {
      statusEl.textContent = '👆 点我听声音';
    }
    if (onEnd) onEnd();
  };
  u.onerror = u.onend;
  synth.speak(u);
}

function renderCard() {
  const d = DINOS[currentIndex];
  seen.add(currentIndex);
  
  document.getElementById('card').innerHTML = `
    <div class="dino-img"><img src="${d.img}" alt="${d.name}"></div>
    <div class="dino-name">${d.name}</div>
    <div class="dino-tags">
      <span>${d.dietEmoji}</span>
      <span>🦴</span>
    </div>
    <div class="play-status">👆 点我听声音</div>
  `;
  
  document.getElementById('navCenter').textContent = `${currentIndex + 1} / ${DINOS.length}`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === DINOS.length - 1;
  renderDots();
}

function renderDots() {
  document.getElementById('progressDots').innerHTML = DINOS.map((_, i) => {
    let c = 'dot';
    if (i === currentIndex) c += ' active';
    else if (seen.has(i)) c += ' seen';
    return `<div class="${c}"></div>`;
  }).join('');
}

function speakDino() {
  log('🔊 播放语音: ' + currentIndex);
  speak(DINOS[currentIndex].sound);
}

function prevCard() {
  log(`prevCard调用: currentIndex=${currentIndex}`);
  if (currentIndex > 0) {
    log('⬅️ 切换到上一张');
    synth.cancel();
    currentIndex--;
    log(`新index: ${currentIndex}`);
    renderCard();
    if (autoPlay) speakDino();
  } else {
    log('❌ 已经是第一张，无法后退');
  }
}

function nextCard() {
  log(`nextCard调用: currentIndex=${currentIndex}, max=${DINOS.length - 1}`);
  if (currentIndex < DINOS.length - 1) {
    log('➡️ 切换到下一张');
    synth.cancel();
    currentIndex++;
    log(`新index: ${currentIndex}`);
    renderCard();
    log('renderCard完成');
    if (autoPlay) speakDino();
  } else {
    log('❌ 已经是最后一张，无法前进');
  }
}

function toggleAuto() {
  log('切换自动播放');
  autoPlay = !autoPlay;
  const btn = document.getElementById('autoBtn');
  if (autoPlay) {
    btn.textContent = '⏸';
    btn.classList.add('playing');
    runAuto();
  } else {
    btn.textContent = '▶️';
    btn.classList.remove('playing');
    synth.cancel();
    clearTimeout(autoTimer);
  }
}

function runAuto() {
  if (!autoPlay) return;
  speak(DINOS[currentIndex].sound, () => {
    autoTimer = setTimeout(() => {
      if (currentIndex < DINOS.length - 1) {
        currentIndex++;
      } else {
        currentIndex = 0;
      }
      renderCard();
      runAuto();
    }, 1500);
  });
}

// 通用触摸处理 - 华为设备专用方案（使用 RAF 代替 setTimeout）
function handleTouch(element, callback) {
  let rafId = null;
  let startTime = 0;
  let pointerMoved = false;
  let pointerStartPos = {x: 0, y: 0};
  let isExecuting = false;
  
  // 阻止长按菜单
  element.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    return false;
  });
  
  // RAF 检查函数
  function checkAndExecute() {
    const elapsed = Date.now() - startTime;
    log(`RAF检查: ${element.id}, elapsed=${elapsed}ms, moved=${pointerMoved}`);
    
    if (elapsed >= 150) {
      // 时间到了
      const isDisabled = element.disabled === true;
      log(`⏰ RAF触发! ${element.id}, moved=${pointerMoved}, disabled=${isDisabled}, isExecuting=${isExecuting}`);
      
      if (!pointerMoved && !isDisabled && !isExecuting) {
        isExecuting = true;
        element.classList.remove('pressed');
        log('✅ 执行回调(RAF): ' + element.id);
        callback();
      } else {
        log(`❌ RAF跳过: moved=${pointerMoved}, disabled=${isDisabled}, isExecuting=${isExecuting}`);
      }
    } else {
      // 继续等待
      rafId = requestAnimationFrame(checkAndExecute);
    }
  }
  
  // 指针按下 - 启动 RAF 循环
  element.addEventListener('pointerdown', (e) => {
    // 取消之前的 RAF
    if (rafId) {
      cancelAnimationFrame(rafId);
      log('取消旧RAF');
    }
    
    pointerMoved = false;
    isExecuting = false;
    pointerStartPos.x = e.clientX;
    pointerStartPos.y = e.clientY;
    startTime = Date.now();
    element.classList.add('pressed');
    log('pointerdown: ' + element.id);
    
    // 启动 RAF 循环
    log('启动RAF循环');
    rafId = requestAnimationFrame(checkAndExecute);
  });
  
  // 指针移动 - 只有大幅移动才取消
  element.addEventListener('pointermove', (e) => {
    const dx = Math.abs(e.clientX - pointerStartPos.x);
    const dy = Math.abs(e.clientY - pointerStartPos.y);
    if (dx > 30 || dy > 30) {
      pointerMoved = true;
      element.classList.remove('pressed');
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      log('pointermove: 大幅移动取消RAF');
    }
  });
  
  // 指针抬起 - 如果还没执行，立即执行
  element.addEventListener('pointerup', (e) => {
    log('pointerup: ' + element.id);
    element.classList.remove('pressed');
    
    const isDisabled = element.disabled === true;
    if (!pointerMoved && !isDisabled && !isExecuting) {
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      isExecuting = true;
      log('✅ 执行回调(立即): ' + element.id);
      callback();
    }
  });
  
  // 指针取消 - 不清除定时器，让它继续
  element.addEventListener('pointercancel', (e) => {
    log('pointercancel: ' + element.id + ' (忽略，不清除定时器)');
  });
  
  // 指针离开 - 不取消定时器，让延迟执行继续
  element.addEventListener('pointerleave', (e) => {
    log('pointerleave: ' + element.id + ' (忽略)');
  });
}

// 初始化所有按钮
function initButtons() {
  handleTouch(document.getElementById('autoBtn'), toggleAuto);
  handleTouch(document.getElementById('prevBtn'), () => {
    if (currentIndex > 0) prevCard();
  });
  handleTouch(document.getElementById('nextBtn'), () => {
    if (currentIndex < DINOS.length - 1) nextCard();
  });
  handleTouch(document.getElementById('card'), speakDino);
}

// 页面加载完成
renderCard();
initButtons();

// 阻止所有图片的长按保存菜单
document.addEventListener('contextmenu', (e) => {
  if (e.target.tagName === 'IMG') {
    e.preventDefault();
  }
});

// 双击左上角显示调试信息
let debugTapCount = 0;
let debugTapTimer = null;
document.querySelector('.header').addEventListener('click', () => {
  debugTapCount++;
  clearTimeout(debugTapTimer);
  if (debugTapCount >= 3) {
    debugMode = !debugMode;
    debugEl.style.display = debugMode ? 'block' : 'none';
    log('调试模式: ' + debugMode);
    debugTapCount = 0;
  }
  debugTapTimer = setTimeout(() => { debugTapCount = 0; }, 1000);
});

log('页面加载完成');
</script>
</body>
</html>
