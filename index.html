<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+Cjx0ZXh0IHk9IjI4IiBmb250LXNpemU9IjI4Ij7wn6aVPC90ZXh0Pgo8L3N2Zz4=">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦕 恐龙闪卡 🦖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
  user-select: none;
  -webkit-user-select: none;
}

/* 顶部简化 - 只有emoji进度 */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.9);
  padding: 8px 16px;
  display: flex; justify-content: center; align-items: center;
  gap: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
.dot {
  width: 20px; height: 20px; border-radius: 50%;
  background: #ddd; transition: all 0.3s;
  cursor: pointer;
}
.dot.active { background: #FF6B6B; transform: scale(1.3); }
.dot.seen { background: #4ECDC4; }

/* 自动播放按钮 */
.auto-btn {
  position: fixed; top: 8px; right: 12px; z-index: 101;
  width: 44px; height: 44px; border-radius: 50%;
  border: none; font-size: 1.4em; cursor: pointer;
  background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.auto-btn.playing { background: #4ECDC4; }

/* 卡片区域 */
.card-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 60px 12px 100px;
}

.card {
  width: 100%; max-width: 380px;
  background: white;
  border-radius: 32px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s;
}
.card:active { transform: scale(0.97); }

/* 恐龙图片 - 超大 */
.dino-img {
  height: 240px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
}
.dino-img img {
  max-height: 230px; max-width: 100%;
  object-fit: contain;
  filter: drop-shadow(4px 6px 12px rgba(0,0,0,0.2));
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 恐龙名字 - 大字+emoji */
.dino-name {
  font-size: 2.2em;
  font-weight: 900;
  color: #333;
  margin-bottom: 12px;
}

/* 属性标签 - 纯emoji，大大的 */
.dino-tags {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 2.5em;
  margin-bottom: 12px;
}

/* 点击提示 - 用动画手指 */
.tap-hint {
  font-size: 2em;
  animation: tapPulse 1.5s ease-in-out infinite;
}
@keyframes tapPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.2); opacity: 1; }
}

/* 声音波浪动画 */
.sound-wave {
  display: none;
  justify-content: center;
  gap: 4px;
  margin: 12px 0;
}
.sound-wave.active { display: flex; }
.sound-wave span {
  width: 6px;
  height: 20px;
  background: #FF6B6B;
  border-radius: 3px;
  animation: wave 0.5s ease-in-out infinite;
}
.sound-wave span:nth-child(2) { animation-delay: 0.1s; }
.sound-wave span:nth-child(3) { animation-delay: 0.2s; }
.sound-wave span:nth-child(4) { animation-delay: 0.3s; }
.sound-wave span:nth-child(5) { animation-delay: 0.4s; }
@keyframes wave {
  0%, 100% { height: 10px; }
  50% { height: 30px; }
}

/* 导航按钮 - 超大 */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.95);
  padding: 12px 24px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  display: flex; justify-content: space-between; align-items: center;
}
.nav-btn {
  width: 80px; height: 80px; border-radius: 50%;
  border: none; font-size: 2.5em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white;
  box-shadow: 0 6px 20px rgba(255,107,107,0.4);
  transition: all 0.2s;
}
.nav-btn:active { transform: scale(0.9); }
.nav-btn:disabled { opacity: 0.3; }
.nav-btn.next { background: linear-gradient(135deg, #4ECDC4, #45B7D1); box-shadow: 0 6px 20px rgba(78,205,196,0.4); }

/* 中间的恐龙emoji指示 */
.nav-dino {
  font-size: 3em;
  animation: dinoWalk 0.5s ease-in-out infinite alternate;
}
@keyframes dinoWalk {
  from { transform: translateX(-5px) rotate(-5deg); }
  to { transform: translateX(5px) rotate(5deg); }
}

/* 叫声反馈 */
.roar-effect {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 5em;
  pointer-events: none;
  opacity: 0;
  z-index: 200;
}
.roar-effect.show {
  animation: roarPop 0.8s ease-out forwards;
}
@keyframes roarPop {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  50% { transform: translate(-50%, -50%) scale(1.5); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
}
</style>
</head>
<body>

<div class="header" id="progressDots"></div>
<button class="auto-btn" id="autoBtn" onclick="toggleAuto()">▶️</button>

<div class="card-container">
  <div class="card" id="card" onclick="speakAndRoar()"></div>
</div>

<div class="roar-effect" id="roarEffect">🔊</div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="prevCard()">👈</button>
  <span class="nav-dino">🦖</span>
  <button class="nav-btn next" id="nextBtn" onclick="nextCard()">👉</button>
</div>

<script>
const DINOS = [
  {
    id: 1, name: "马门溪龙", en: "Mamenchisaurus",
    img: "images/01_mamenchisaurus.png",
    emoji: "🦕", dietEmoji: "🌿", eraEmoji: "🌋",
    sound: "马门溪龙，脖子超级长的大恐龙！它的脖子比长颈鹿还要长好几倍呢！",
    roar: "嗷呜～～"
  },
  {
    id: 2, name: "无齿翼龙", en: "Pteranodon", 
    img: "images/02_pteranodon.png",
    emoji: "🦅", dietEmoji: "🐟", eraEmoji: "🌍",
    sound: "无齿翼龙，会飞的大翅膀！它像一架小飞机，在天上抓鱼吃！",
    roar: "嘎嘎嘎～"
  },
  {
    id: 3, name: "剑龙", en: "Stegosaurus",
    img: "images/03_stegosaurus.png", 
    emoji: "🦕", dietEmoji: "🌿", eraEmoji: "🌋",
    sound: "剑龙，背上有好多三角形的板子！尾巴上还有大刺，可厉害了！",
    roar: "哼哼～"
  },
  {
    id: 4, name: "腔骨龙", en: "Coelophysis",
    img: "images/04_coelophysis.png",
    emoji: "🦖", dietEmoji: "🍖", eraEmoji: "🌋", 
    sound: "腔骨龙，跑得飞快的小恐龙！它的骨头是空心的，像吸管一样轻！",
    roar: "嘶嘶嘶～"
  },
  {
    id: 5, name: "双型齿翼龙", en: "Dimorphodon",
    img: "images/05_dimorphodon.png",
    emoji: "🦅", dietEmoji: "🍖", eraEmoji: "🌋",
    sound: "双型齿翼龙，有两种牙齿的飞龙！它的头很大，看起来萌萌的！",
    roar: "呱呱～"
  },
  {
    id: 6, name: "异特龙", en: "Allosaurus",
    img: "images/06_allosaurus.png",
    emoji: "🦖", dietEmoji: "🍖", eraEmoji: "🌋",
    sound: "异特龙，超级厉害的大恐龙！它的嘴巴可以张得很大很大！",
    roar: "吼！！"
  },
  {
    id: 7, name: "窃蛋龙", en: "Oviraptor",
    img: "images/07_oviraptor.png",
    emoji: "🦖", dietEmoji: "🥚", eraEmoji: "🌍",
    sound: "窃蛋龙，其实是个好妈妈！它在保护自己的蛋宝宝呢！",
    roar: "咕咕～"
  },
  {
    id: 8, name: "美颌龙", en: "Compsognathus",
    img: "images/08_compsognathus.png",
    emoji: "🦖", dietEmoji: "🍖", eraEmoji: "🌋",
    sound: "美颌龙，只有小鸡那么大！是最小的恐龙之一，但跑得可快了！",
    roar: "叽叽～"
  },
  {
    id: 9, name: "尖角龙", en: "Centrosaurus",
    img: "images/09_centrosaurus.png",
    emoji: "🦏", dietEmoji: "🌿", eraEmoji: "🌍",
    sound: "尖角龙，鼻子上有一个大角！它们喜欢一大群一起走，像牛群一样！",
    roar: "哞～"
  },
  {
    id: 10, name: "风神翼龙", en: "Quetzalcoatlus",
    img: "images/10_quetzalcoatlus.png",
    emoji: "🦅", dietEmoji: "🍖", eraEmoji: "🌍",
    sound: "风神翼龙，最大的飞行动物！站起来有长颈鹿那么高！翅膀张开比汽车还宽！",
    roar: "嘎嗷～～"
  }
];

let currentIndex = 0;
let seen = new Set();
let autoPlay = false;
let autoTimer = null;
let speaking = false;

// 语音合成
const synth = window.speechSynthesis;

function speak(text, callback) {
  if (speaking) {
    synth.cancel();
  }
  speaking = true;
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.85; // 慢一点，适合小朋友
  utterance.pitch = 1.1; // 稍微高一点，更活泼
  
  utterance.onend = () => {
    speaking = false;
    document.querySelector('.sound-wave')?.classList.remove('active');
    if (callback) callback();
  };
  
  utterance.onerror = () => {
    speaking = false;
    document.querySelector('.sound-wave')?.classList.remove('active');
  };
  
  document.querySelector('.sound-wave')?.classList.add('active');
  synth.speak(utterance);
}

function renderCard() {
  const dino = DINOS[currentIndex];
  seen.add(currentIndex);
  
  document.getElementById('card').innerHTML = `
    <div class="dino-img">
      <img src="${dino.img}" alt="${dino.name}">
    </div>
    <div class="dino-name">${dino.emoji} ${dino.name}</div>
    <div class="dino-tags">
      <span title="食物">${dino.dietEmoji}</span>
      <span title="时代">${dino.eraEmoji}</span>
    </div>
    <div class="sound-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="tap-hint">👆</div>
  `;
  
  // 更新进度点
  renderDots();
  
  // 更新按钮状态
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === DINOS.length - 1;
}

function renderDots() {
  const dotsHtml = DINOS.map((_, i) => {
    let cls = 'dot';
    if (i === currentIndex) cls += ' active';
    else if (seen.has(i)) cls += ' seen';
    return `<div class="${cls}" onclick="goTo(${i})"></div>`;
  }).join('');
  document.getElementById('progressDots').innerHTML = dotsHtml;
}

function speakAndRoar() {
  const dino = DINOS[currentIndex];
  
  // 显示叫声效果
  const roarEl = document.getElementById('roarEffect');
  roarEl.textContent = dino.roar;
  roarEl.classList.remove('show');
  void roarEl.offsetWidth; // 触发重绘
  roarEl.classList.add('show');
  
  // 朗读
  speak(dino.name + "！" + dino.sound);
}

function prevCard() {
  if (currentIndex > 0) {
    synth.cancel();
    currentIndex--;
    renderCard();
    if (autoPlay) speakAndRoar();
  }
}

function nextCard() {
  if (currentIndex < DINOS.length - 1) {
    synth.cancel();
    currentIndex++;
    renderCard();
    if (autoPlay) speakAndRoar();
  }
}

function goTo(index) {
  synth.cancel();
  currentIndex = index;
  renderCard();
}

function toggleAuto() {
  autoPlay = !autoPlay;
  const btn = document.getElementById('autoBtn');
  
  if (autoPlay) {
    btn.textContent = '⏸️';
    btn.classList.add('playing');
    autoNext();
  } else {
    btn.textContent = '▶️';
    btn.classList.remove('playing');
    synth.cancel();
    if (autoTimer) clearTimeout(autoTimer);
  }
}

function autoNext() {
  if (!autoPlay) return;
  
  speakAndRoar();
  
  autoTimer = setTimeout(() => {
    if (currentIndex < DINOS.length - 1) {
      currentIndex++;
      renderCard();
      autoNext();
    } else {
      // 循环播放
      currentIndex = 0;
      renderCard();
      autoNext();
    }
  }, 6000); // 每6秒换一张
}

// 滑动支持
let touchStartX = 0;
document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX, {passive: true});
document.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) {
    if (diff > 0) prevCard();
    else nextCard();
  }
}, {passive: true});

// 键盘支持（给家长测试用）
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === ' ') speakAndRoar();
});

// 初始化
renderCard();
</script>
</body>
</html>
